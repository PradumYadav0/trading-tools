name: Deploy to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            if [ ! -d "$HOME/trading-tools" ]; then
              git clone https://github.com/PradumYadav0/trading-tools.git $HOME/trading-tools
            fi
            cd $HOME/trading-tools
            
            # Forcefully remove untracked files and clean up before pulling
            git reset --hard
            git clean -fd
            
            git pull origin main
            
            # Install frontend dependencies and build
            npm install
            npm run build
            
            # Install backend dependencies and restart PM2
            cd backend
            npm install
            
            # Stop and delete conflicting/old PM2 processes if they exist
            pm2 stop trading || true
            pm2 delete trading || true
            pm2 stop trading-api || true
            pm2 delete trading-api || true
            
            # Ensure port 5000 is completely free
            npx -y kill-port 5000 || true
            
            # Start the new server as trading-api
            pm2 start server.js --name trading-api
